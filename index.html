<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>NS-VAULT v9.0 — Premium Digital Services Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>


<link href="style.css" rel="stylesheet"/></head>
<body>
<div class="max-w-[480px] mx-auto bg-white min-h-screen relative shadow-2xl" id="nvApp">
<!-- HOME SCREEN -->
<div id="homeScreen">
<!-- HERO -->
<div class="relative w-full overflow-hidden bg-gradient-to-b from-slate-900 via-indigo-950 to-violet-900 pb-1">
<!-- Mesh -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="mesh-blob w-72 h-72 bg-purple-500/70 -top-16 -left-16" style="animation-duration:15s"></div>
<div class="mesh-blob w-64 h-64 bg-pink-500/60 top-1/4 -right-20" style="animation-duration:19s;animation-delay:-5s"></div>
<div class="mesh-blob w-60 h-60 bg-indigo-500/60 -bottom-12 left-1/6" style="animation-duration:17s;animation-delay:-9s"></div>
<div class="mesh-blob w-52 h-52 bg-fuchsia-500/55 top-1/2 right-4" style="animation-duration:13s;animation-delay:-3s"></div>
</div>
<!-- Particles -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="particle w-1 h-1 left-[10%] top-[88%]" style="animation-duration:11s"></div>
<div class="particle w-1.5 h-1.5 left-[22%] top-[92%]" style="animation-duration:15s;animation-delay:-2s"></div>
<div class="particle w-1 h-1 left-[38%] top-[85%]" style="animation-duration:13s;animation-delay:-5s"></div>
<div class="particle w-2 h-2 left-[52%] top-[90%] opacity-75" style="animation-duration:10s;animation-delay:-1s"></div>
<div class="particle w-1 h-1 left-[65%] top-[86%]" style="animation-duration:12s;animation-delay:-3s"></div>
<div class="particle w-1.5 h-1.5 left-[78%] top-[93%] opacity-65" style="animation-duration:14s;animation-delay:-6s"></div>
</div>
<!-- NAV -->
<nav class="relative z-20 flex items-center justify-between px-5 py-4">
<div class="flex items-center gap-3">
<div class="logo-shine w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-500 grid place-items-center text-white font-black text-sm shadow-lg shadow-indigo-500/30 border border-white/20">NS</div>
<div class="text-white font-black text-xl tracking-tight">NS-VAULT</div>
</div>
<div class="flex items-center gap-2">
<button class="w-10 h-10 rounded-xl border border-white/15 bg-white/10 backdrop-blur-md text-white grid place-items-center hover:bg-white/20 active:scale-95 transition" onclick="NV.openSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
<button class="w-10 h-10 rounded-xl border border-white/15 bg-white/10 backdrop-blur-md text-white grid place-items-center hover:bg-white/20 active:scale-95 transition relative"><i class="fa-solid fa-bell"></i><span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-slate-900 animate-pulse"></span></button>
<button class="w-10 h-10 rounded-xl border border-white/15 bg-white/10 backdrop-blur-md text-white grid place-items-center hover:bg-white/20 active:scale-95 transition"><i class="fa-solid fa-bars"></i></button>
</div>
</nav>
<!-- SEARCH -->
<div class="relative z-20 px-5 pb-4">
<div class="flex items-center gap-3 px-4 py-3 rounded-nvxl bg-white/10 backdrop-blur-xl border border-white/15 text-white/70 text-sm font-medium cursor-pointer hover:bg-white/15 hover:border-white/30 transition shadow-lg" onclick="NV.openSearch()">
<i class="fa-solid fa-magnifying-glass text-white/50"></i>
<span class="flex-1 truncate">Search services, deals, offers...</span>
<i class="fa-solid fa-sliders text-white/50"></i>
</div>
</div>
<!-- BANNER -->
<div class="relative z-10 px-5 pb-5 overflow-hidden" id="bannerWrap">
<div class="banner-track" id="bannerTrack"></div>
<div class="flex gap-1.5 mt-3 px-1" id="bannerProgress"></div>
</div>
</div>
<!-- CHIPS -->
<div class="relative z-30 -mt-4 -mx-5 w-[calc(100%+40px)]">
<div class="flex gap-2.5 overflow-x-auto hide-scrollbar px-5 py-2" id="chipsScroll"></div>
</div>
<!-- CATEGORIES -->
<div class="px-5 pt-4 pb-6" id="categoriesSection"></div>
<!-- BEST DEALS -->
<div class="pb-6 opacity-0 translate-y-6 transition-all duration-700 ease-out reveal-section" id="dealsSection"></div>
<!-- TRENDING -->
<div class="pb-6 opacity-0 translate-y-6 transition-all duration-700 ease-out reveal-section" id="trendingSection"></div>
<!-- POPULAR SERVICES -->
<div class="px-5 pb-24 opacity-0 translate-y-6 transition-all duration-700 ease-out reveal-section" id="servicesSection"></div>
</div>
<!-- SUB SCREEN -->
<div class="fixed inset-0 z-[90] bg-nv-bg overflow-y-auto translate-x-full transition-transform duration-500 ease-out hidden flex-col" id="subScreen">
<!-- Content injected here -->
</div>
<!-- SEARCH OVERLAY -->
<div class="fixed inset-0 z-[200] bg-slate-900/98 backdrop-blur-xl p-5 flex flex-col gap-5 hidden opacity-0 transition-opacity duration-300" id="searchOverlay">
<div class="flex items-center gap-3">
<div class="flex-1 flex items-center gap-3 px-4 py-3 rounded-nvxl bg-white/10 border border-white/20 text-white">
<i class="fa-solid fa-magnifying-glass text-white/50"></i>
<input autocomplete="off" class="bg-transparent border-none outline-none text-white text-sm font-medium w-full" id="searchInput" placeholder="Type to search..." type="text"/>
</div>
<button class="w-10 h-10 rounded-xl bg-white/10 text-white grid place-items-center hover:bg-white/20 transition" onclick="NV.closeSearch()"><i class="fa-solid fa-xmark text-xl"></i></button>
</div>
<div id="searchTags">
<div class="text-white/60 text-sm font-semibold mb-3">Popular Searches</div>
<div class="flex flex-wrap gap-2" id="searchTagList"></div>
</div>
<div class="flex-1 overflow-y-auto hide-scrollbar hidden" id="searchResults"></div>
</div>
<!-- TOAST -->
<div class="fixed bottom-24 left-1/2 -translate-x-1/2 translate-y-24 bg-slate-900 text-white px-6 py-3 rounded-nvxl text-sm font-bold shadow-2xl transition-transform duration-400 pointer-events-none z-[300]" id="toast"></div>
<!-- BOTTOM NAV -->
<nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-[480px] z-[100] bg-white/95 backdrop-blur-2xl border-t border-slate-200/80 py-2.5 pb-6 flex justify-around items-center">
<div class="nav-item active flex flex-col items-center gap-1 px-3 py-1 text-slate-400 text-[10px] font-bold cursor-pointer transition" data-i="0"><i class="fa-solid fa-house text-xl"></i><span>Home</span></div>
<div class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-slate-400 text-[10px] font-bold cursor-pointer transition" data-i="1"><i class="fa-solid fa-compass text-xl"></i><span>Explore</span></div>
<div class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-slate-400 text-[10px] font-bold cursor-pointer transition" data-i="2"><i class="fa-solid fa-bag-shopping text-xl"></i><span>Orders</span></div>
<div class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-slate-400 text-[10px] font-bold cursor-pointer transition" data-i="3"><i class="fa-solid fa-wallet text-xl"></i><span>Wallet</span></div>
<div class="nav-item flex flex-col items-center gap-1 px-3 py-1 text-slate-400 text-[10px] font-bold cursor-pointer transition" data-i="4"><i class="fa-solid fa-user text-xl"></i><span>Profile</span></div>
</nav>
</div>

<script src="script.js"></script></body>
</html>
